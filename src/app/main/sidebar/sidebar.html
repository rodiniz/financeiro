
<!-- Modern Luxury Sidebar -->
<div class="fixed top-0 left-0 h-screen w-72 bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 shadow-2xl shadow-black/50 border-r border-slate-800/50 flex flex-col z-50 backdrop-blur-xl">
  <!-- Decorative top accent -->
  <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
  
  <!-- Logo Area with gradient background -->
  <div class="relative p-8 border-b border-slate-800/50 bg-gradient-to-br from-slate-900/50 to-transparent">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-amber-900/10 to-transparent"></div>
    <h1 class="relative text-3xl font-serif font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-amber-200 via-amber-400 to-amber-600 drop-shadow-[0_0_20px_rgba(251,191,36,0.2)]">
      {{ i18n.t('app.title') }}
    </h1>
    <p class="relative mt-1 text-xs text-slate-500 tracking-widest uppercase font-light">Financial Suite</p>
  </div>

  <!-- Navigation Links with enhanced styling -->
  <nav class="flex-1 p-6 space-y-2 overflow-y-auto scrollbar-thin scrollbar-thumb-slate-800 scrollbar-track-transparent">
    <a 
      routerLink="dashboard" 
      routerLinkActive="active-nav-link"
      class="group flex items-center space-x-4 px-5 py-4 rounded-xl text-slate-400 hover:text-amber-400 hover:bg-slate-800/50 transition-all duration-300 border border-transparent hover:border-slate-800/50 hover:shadow-lg hover:shadow-amber-900/10 relative overflow-hidden"
    >
      <div class="absolute inset-0 bg-gradient-to-r from-amber-500/0 group-hover:from-amber-500/5 to-transparent transition-all duration-300"></div>
      <z-icon zType="house" class="relative z-10 w-5 h-5 group-hover:scale-110 transition-transform duration-300" />
      <span class="relative z-10 font-medium tracking-wide">{{ i18n.t('menu.dashboard') }}</span>
      <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 group-hover:h-8 bg-gradient-to-b from-transparent via-amber-500 to-transparent transition-all duration-300 rounded-r"></div>
    </a>
    
    <a 
      routerLink="listCategories" 
      routerLinkActive="active-nav-link"
      class="group flex items-center space-x-4 px-5 py-4 rounded-xl text-slate-400 hover:text-amber-400 hover:bg-slate-800/50 transition-all duration-300 border border-transparent hover:border-slate-800/50 hover:shadow-lg hover:shadow-amber-900/10 relative overflow-hidden"
    >
      <div class="absolute inset-0 bg-gradient-to-r from-amber-500/0 group-hover:from-amber-500/5 to-transparent transition-all duration-300"></div>
      <z-icon zType="settings" class="relative z-10 w-5 h-5 group-hover:scale-110 transition-transform duration-300" />
      <span class="relative z-10 font-medium tracking-wide">{{ i18n.t('menu.categories') }}</span>
      <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 group-hover:h-8 bg-gradient-to-b from-transparent via-amber-500 to-transparent transition-all duration-300 rounded-r"></div>
    </a>

    <a 
      routerLink="listExpenses" 
      routerLinkActive="active-nav-link"
      class="group flex items-center space-x-4 px-5 py-4 rounded-xl text-slate-400 hover:text-amber-400 hover:bg-slate-800/50 transition-all duration-300 border border-transparent hover:border-slate-800/50 hover:shadow-lg hover:shadow-amber-900/10 relative overflow-hidden"
    >
      <div class="absolute inset-0 bg-gradient-to-r from-amber-500/0 group-hover:from-amber-500/5 to-transparent transition-all duration-300"></div>
      <z-icon zType="check" class="relative z-10 w-5 h-5 group-hover:scale-110 transition-transform duration-300" />  
      <span class="relative z-10 font-medium tracking-wide">{{ i18n.t('menu.expenses') }}</span>
      <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-0 group-hover:h-8 bg-gradient-to-b from-transparent via-amber-500 to-transparent transition-all duration-300 rounded-r"></div>
    </a>
  </nav>

  <!-- Decorative bottom accent -->
  <div class="relative p-6 border-t border-slate-800/50">
    <div class="absolute bottom-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
    <div class="flex items-center justify-center gap-2">
      <div class="h-1 w-1 rounded-full bg-slate-700 animate-pulse"></div>
      <div class="h-1 w-1 rounded-full bg-slate-700 animate-pulse" style="animation-delay: 0.2s;"></div>
      <div class="h-1 w-1 rounded-full bg-slate-700 animate-pulse" style="animation-delay: 0.4s;"></div>
    </div>
  </div>
</div>

<style>
  .scrollbar-thin::-webkit-scrollbar {
    width: 6px;
  }
  
  .scrollbar-thin::-webkit-scrollbar-track {
    background: transparent;
  }
  
  .scrollbar-thin::-webkit-scrollbar-thumb {
    background: rgb(30, 41, 59);
    border-radius: 3px;
  }
  
  .scrollbar-thin::-webkit-scrollbar-thumb:hover {
    background: rgb(51, 65, 85);
  }
</style>
