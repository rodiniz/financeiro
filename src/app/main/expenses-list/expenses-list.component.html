<div class="w-full max-w-7xl mx-auto space-y-6">
    <!-- Header with Actions -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
            <h2 class="text-3xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-400">
                Despesas
            </h2>
            <p class="text-slate-500 text-sm mt-1">Gerencie todas as suas despesas</p>
        </div>
        
        <div class="flex gap-3">
            <button 
                z-button 
                zType="default" 
                (click)="redirectToCreate()"
                class="group relative overflow-hidden bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-semibold tracking-wide shadow-lg shadow-amber-900/30 hover:shadow-amber-600/40 hover:scale-[1.02] transition-all duration-300 px-6 py-3 rounded-xl border-0"
            >
                <span class="relative z-10 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Incluir
                </span>
            </button>
            
            <button 
                z-button 
                zType="default" 
                (click)="importExpenses()"
                class="group relative overflow-hidden bg-slate-800/50 hover:bg-slate-700/50 text-slate-300 hover:text-slate-100 border border-slate-700 hover:border-slate-600 font-medium tracking-wide transition-all duration-300 px-6 py-3 rounded-xl hover:shadow-lg"
            >
                <span class="relative z-10 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    Importar
                </span>
            </button>
        </div>
    </div>

    <!-- Table Card -->
    <div class="relative overflow-hidden rounded-2xl bg-slate-900/50 backdrop-blur-sm border border-slate-800/50 shadow-2xl shadow-black/20">
        <div class="absolute inset-0 bg-gradient-to-br from-amber-500/5 to-transparent opacity-50"></div>
        
        <div class="relative z-10 overflow-x-auto">
            <table z-table zType="striped" class="w-full">
                <thead z-table-header class="bg-slate-950/50 border-b border-slate-800/50">
                    <tr z-table-row>
                        <th z-table-head class="text-slate-300 font-semibold tracking-wide uppercase text-xs py-4 px-6">Descrição</th>
                        <th z-table-head class="text-slate-300 font-semibold tracking-wide uppercase text-xs py-4 px-6">Valor</th>
                        <th z-table-head class="text-slate-300 font-semibold tracking-wide uppercase text-xs py-4 px-6">Data</th>
                        <th z-table-head class="text-slate-300 font-semibold tracking-wide uppercase text-xs py-4 px-6">Categoria</th>
                        <th z-table-head class="text-slate-300 font-semibold tracking-wide uppercase text-xs py-4 px-6 text-right">Ações</th>
                    </tr>
                </thead>
                <tbody z-table-body>
                    @for (expense of expenses(); track expense._id) {
                        <tr z-table-row class="group hover:bg-slate-800/30 transition-all duration-200">
                            <td z-table-cell class="text-slate-200 py-4 px-6 font-medium">
                                {{expense.description}}
                            </td>
                            <td z-table-cell class="text-rose-400 py-4 px-6 font-mono font-semibold">
                                {{expense.amount | currency:'EUR':'symbol':'1.2-2'}}
                            </td>
                            <td z-table-cell class="text-slate-400 py-4 px-6">
                                {{formatData(expense.date)}}
                            </td>
                            <td z-table-cell class="py-4 px-6">
                                <span class="inline-flex items-center px-3 py-1 rounded-lg bg-amber-500/10 border border-amber-500/20 text-amber-400 text-sm font-medium">
                                    {{expense.category}}
                                </span>
                            </td>
                            <td z-table-cell class="py-4 px-6">
                                <div class="flex items-center justify-end gap-2">
                                    <button 
                                        z-button 
                                        zType="default" 
                                        zSize="default" 
                                        (click)="redirectToEdit(expense._id)"
                                        class="group/btn relative overflow-hidden bg-slate-800/50 hover:bg-blue-600/20 text-slate-300 hover:text-blue-400 border border-slate-700 hover:border-blue-500/50 transition-all duration-300 px-4 py-2 rounded-lg text-sm"
                                    >
                                        <span class="flex items-center gap-2">
                                            <lucide-angular name="FilePenLineIcon" class="w-4 h-4"></lucide-angular>
                                            Editar
                                        </span>
                                    </button>
                                    
                                    <button 
                                        z-button 
                                        zType="destructive" 
                                        zSize="default" 
                                        (click)="delete(expense._id)"
                                        class="group/btn relative overflow-hidden bg-rose-900/20 hover:bg-rose-600/30 text-rose-400 hover:text-rose-300 border border-rose-800/50 hover:border-rose-600/50 transition-all duration-300 px-4 py-2 rounded-lg text-sm"
                                    >
                                        <span class="flex items-center gap-2">
                                            <lucide-angular name="Trash2Icon" class="w-4 h-4"></lucide-angular>
                                            Deletar
                                        </span>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    } @empty {
                        <tr z-table-row>
                            <td z-table-cell [attr.colspan]="5" class="h-32 text-center">
                                <div class="flex flex-col items-center justify-center space-y-3">
                                    <div class="h-16 w-16 rounded-full bg-slate-800/50 flex items-center justify-center">
                                        <svg class="w-8 h-8 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
                                        </svg>
                                    </div>
                                    <p class="text-slate-400 font-medium">Nenhuma despesa encontrada</p>
                                </div>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
