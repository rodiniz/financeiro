<div class="overflow-x-auto">
  <button class="btn btn-primary ml-4 mt-3" (click)="redirectToCreate()">
    Incluir
  </button>

  <button class="btn btn-accent ml-4 mt-3" (click)="importExpenses()">
    Importar
  </button>

  @if(importing){

  <span class="loading loading-spinner loading-lg pt-5"></span>
  } @if(!importing){
  <table class="table table-zebra">
    <!-- head -->
    <thead>
      <tr>
        <th>Descrição</th>
        <th>Valor</th>
        <th>Data</th>
        <th>Categoria</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (item of expenses; track $index) {
      <tr>
        <th>{{ item.description }}</th>
        <th>{{ item.amount }}</th>
        <th>{{ formatData(item.date) }}</th>
        <th>{{ item.category }}</th>
        <td>
          <button class="btn btn-accent" (click)="redirectToEdit(item._id)">
            <lucide-angular
              name="FilePenLineIcon"
              class="my-icon"
            ></lucide-angular>
            Editar
          </button>
          <button class="btn btn-error ml-4" (click)="delete(item._id)">
            <lucide-angular name="Trash2Icon" class="my-icon"></lucide-angular>
            Excluir
          </button>
        </td>
      </tr>
      }
    </tbody>
  </table>
  }
</div>
