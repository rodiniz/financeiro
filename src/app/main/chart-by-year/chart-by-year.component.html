<div class="w-full max-w-6xl mx-auto space-y-8">
  <!-- Filter Section -->
  <div class="relative overflow-hidden rounded-2xl bg-slate-900/50 backdrop-blur-sm border border-slate-800/50 p-8">
    <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent"></div>
    
    <div class="relative z-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
      <div>
        <h2 class="text-2xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-400">
          {{ i18n.t('chart.yearlyAnalysisTitle') }}
        </h2>
        <p class="text-slate-500 text-sm mt-1">{{ i18n.t('chart.yearlyAnalysisSubtitle') }}</p>
      </div>
      
      <div class="flex items-center gap-3 px-6 py-3 rounded-xl bg-slate-950/50 border border-slate-700/50">
        <label for="category" class="text-sm text-slate-400 font-medium tracking-wide">{{ i18n.t('chart.year') }}:</label>
        <select
          id="category"
          [formControl]="year"
          (change)="getChart()"
          class="bg-slate-950/50 border border-slate-700 text-slate-200 rounded-lg px-4 py-2 text-sm font-medium focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/20 transition-all duration-300 cursor-pointer hover:border-blue-500/30"
        >
          @for (reg of years; track $index) {
            <option value="{{ reg.year }}" class="bg-slate-900">{{ reg.year }}</option>
          }
        </select>
      </div>
    </div>
  </div>

  <!-- Chart Section -->
  <div class="relative overflow-hidden rounded-2xl bg-slate-900/50 backdrop-blur-sm border border-slate-800/50 p-8 hover:border-slate-700/50 transition-all duration-500 group">
    <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
    
    <div class="relative z-10">
      <div class="flex items-center gap-3 mb-6">
        <div class="h-12 w-12 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center">
          <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
          </svg>
        </div>
        <div>
          <h3 class="text-xl font-serif font-bold text-slate-200">{{ i18n.t('chart.annualPerformanceTitle') }}</h3>
          <p class="text-slate-500 text-sm">{{ i18n.t('chart.monthlyComparativeView') }}</p>
        </div>
      </div>
      
      <div class="bg-slate-950/30 rounded-xl p-6 border border-slate-800/30">
        @if(chartOptions && chartOptions.series){
          <apx-chart
            [series]="chartOptions.series"
            [chart]="chartOptions.chart"
            [xaxis]="chartOptions.xaxis"
            [title]="chartOptions.title"
          >
          </apx-chart>
        }
      </div>
    </div>
  </div>
</div>
