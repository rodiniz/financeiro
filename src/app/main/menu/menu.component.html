<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <!-- Sidebar -->
    <app-sidebar></app-sidebar>
    
    <!-- Main content area with adjusted margin for sidebar -->
    <div class="ml-72">
        <!-- Top Header Bar -->
        <header class="sticky top-0 z-40 backdrop-blur-xl bg-slate-950/80 border-b border-slate-800/50 shadow-lg shadow-black/20">
            <div class="flex items-center justify-between px-8 py-5">
                <div class="flex items-center space-x-4">
                    <div class="h-8 w-1 bg-gradient-to-b from-transparent via-amber-500 to-transparent rounded-full"></div>
                    <h1 class="text-2xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-400 tracking-tight">
                        Controle Financeiro
                    </h1>
                </div>
                
                <div class="flex items-center space-x-6">
                    <!-- Decorative status indicator -->
                    <div class="flex items-center space-x-2 px-4 py-2 rounded-full bg-slate-800/50 border border-slate-700/50">
                        <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse shadow-lg shadow-emerald-500/50"></div>
                        <span class="text-xs text-slate-400 font-medium tracking-wider uppercase">Ativo</span>
                    </div>
                    
                    <button class="group relative px-5 py-2 rounded-xl bg-slate-800/50 hover:bg-slate-800 border border-slate-700/50 hover:border-amber-500/50 text-slate-300 hover:text-amber-400 font-medium transition-all duration-300 hover:shadow-lg hover:shadow-amber-900/20">
                        <span class="relative z-10">Perfil</span>
                        <div class="absolute inset-0 bg-gradient-to-r from-amber-500/0 to-amber-500/0 group-hover:from-amber-500/10 group-hover:to-transparent rounded-xl transition-all duration-300"></div>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Main Content Area -->
        <main class="relative p-8">
            <!-- Background decorative elements -->
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-amber-900/5 via-transparent to-transparent pointer-events-none"></div>
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_left,_var(--tw-gradient-stops))] from-blue-900/5 via-transparent to-transparent pointer-events-none"></div>
            
            <section class="relative z-10">
                <router-outlet></router-outlet>
            </section>
        </main>
    </div>
</div>
