<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <!-- Sidebar -->
    <app-sidebar></app-sidebar>
    
    <!-- Main content area with adjusted margin for sidebar -->
    <div class="ml-72">
        <!-- Top Header Bar -->
        <header class="sticky top-0 z-40 backdrop-blur-xl bg-slate-950/80 border-b border-slate-800/50 shadow-lg shadow-black/20">
            <div class="flex items-center justify-between px-8 py-5">
                <div class="flex items-center space-x-4">
                    <div class="h-8 w-1 bg-gradient-to-b from-transparent via-amber-500 to-transparent rounded-full"></div>
                    <h1 class="text-2xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-400 tracking-tight">
                        {{ i18n.t('app.title') }}
                    </h1>
                </div>               
                
                <button 
                    (click)="toggleLanguage()"
                    class="flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-600 text-white rounded-lg hover:bg-slate-700 transition-all duration-200"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
                    </svg>
                    {{ i18n.language() === 'pt' ? 'PT' : 'EN' }}
                </button>
            </div>
        </header>
        
        <!-- Main Content Area -->
        <main class="relative p-8">
            <!-- Background decorative elements -->
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-amber-900/5 via-transparent to-transparent pointer-events-none"></div>
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_left,_var(--tw-gradient-stops))] from-blue-900/5 via-transparent to-transparent pointer-events-none"></div>
            
            <section class="relative z-10">
                <router-outlet></router-outlet>
            </section>
        </main>
    </div>
</div>
