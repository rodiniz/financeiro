<div class="page">
  <div class="sidebar">
    <div class="top-row ps-3 navbar navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="">Financeiro</a>
      </div>
    </div>

    <input type="checkbox" title="Navigation menu" class="navbar-toggler" />

    <div
      class="nav-scrollable"
      onclick="document.querySelector('.navbar-toggler').click()"
    >
      <nav class="flex-column">
        <div class="nav-item px-3">
          <a
            class="nav-link"
            routerLink="/menu/listExpenses"
            routerLinkActive="active"
          >
            <lucide-angular name="BadgeEuroIcon" color="white"></lucide-angular>
            &nbsp; Despesas
          </a>
        </div>

        <div class="nav-item px-3">
          <a
            class="nav-link"
            routerLink="/menu/listCategories"
            routerLinkActive="active"
          >
            <lucide-angular name="CaseUpperIcon" color="white"></lucide-angular>
            &nbsp; Categorias
          </a>
        </div>
          <div class="nav-item px-3">
              <a
                      class="nav-link"
                      routerLink="/menu/dashboard"
                      routerLinkActive="active"
              >
                  <lucide-angular name="ChartBarIcon" color="white"></lucide-angular>
                  &nbsp;DashBoard
              </a>
          </div>
        <div class="nav-item px-3">
          <a
            class="nav-link"
            routerLink="/menu/chartByYear"
            routerLinkActive="active"
          >
            <lucide-angular name="ChartBarIcon" color="white"></lucide-angular>
            &nbsp;Gráfico por ano
          </a>
        </div>

        <div class="nav-item px-3">
          <a
            class="nav-link"
            routerLink="/menu/chartByCategory"
            routerLinkActive="active"
          >
            <lucide-angular name="ChartPieIcon" color="white"></lucide-angular>
            &nbsp; Gráfico por categoria
          </a>
        </div>

        <div class="nav-item px-3">
          <button
            class="nav-link"
            (click)="backupDatabase()"
          >       
            &nbsp; Backup do banco de dados
          </button>
        </div>
       
        <div class="nav-item px-3">
          <button
            class="nav-link"
            (click)="restoreDatabase()"
          >       
            &nbsp; Restaurar banco de dados
          </button>
        </div>
       

      </nav>
    </div>
  </div>

  <main>
    <article class="content px-4">
      <router-outlet></router-outlet>
    </article>
  </main>
</div>
