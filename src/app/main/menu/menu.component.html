<div class="drawer drawer-open">
  <input id="my-drawer-3" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content flex flex-col">
    <!-- Navbar -->
    <div class="navbar bg-yellow-200 w-full">
      <div class="flex-none lg:hidden">
        <label
          for="my-drawer-3"
          aria-label="open sidebar"
          class="btn btn-square btn-ghost"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            class="inline-block h-6 w-6 stroke-current"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </label>
      </div>
      <div class="mx-2 flex-1 px-2">Financeiro</div>
      <div class="flex-none mr-10">
        <button class="btn btn-primary" (click)="goToLogin()">Sair</button>
      </div>
    </div>
    <router-outlet></router-outlet>
  </div>
  <div class="drawer-side">
    <label
      for="my-drawer-3"
      aria-label="close sidebar"
      class="drawer-overlay"
    ></label>
    <ul class="menu bg-base-200 min-h-full w-80 p-4 pt-40">
      <!-- Sidebar content here -->
      <li><a routerLink="/menu/listCategories">Categorias</a></li>
      <li><a routerLink="/menu/listExpenses">Despesas</a></li>
      <li><a routerLink="/menu/chartByYear">Gráfico por ano</a></li>
    </ul>
  </div>
</div>
