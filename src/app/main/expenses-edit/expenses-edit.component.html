<div class="flex items-center justify-center min-h-[calc(100vh-200px)] py-8">
    <div class="w-full max-w-3xl">
        <!-- Card Header -->
        <div class="mb-6">
            <h2 class="text-3xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-400">
                {{isEditing() ? i18n.t('expenses.edit.editExpense') : i18n.t('expenses.edit.newExpense')}}
            </h2>
            <p class="text-slate-500 text-sm mt-1">{{isEditing() ? i18n.t('expenses.edit.editDescription') : i18n.t('expenses.edit.newDescription')}}</p>
        </div>
        
        <z-card class="relative overflow-hidden backdrop-blur-xl bg-slate-900/60 border-slate-700/50 shadow-2xl shadow-black/50 hover:shadow-amber-900/20 transition-all duration-500 p-8">
            <div class="absolute inset-0 bg-gradient-to-br from-amber-500/5 to-transparent opacity-50"></div>
            
            <form (ngSubmit)="onsubmit()" class="relative z-10 space-y-6">
                <input type="hidden" [formControl]="idControl">
                
                <z-form-field class="space-y-2">
                    <label z-form-label zRequired class="text-slate-300 font-medium text-sm tracking-wide">{{ i18n.t('expenses.edit.description') }}</label>
                    <z-form-control>
                        <input 
                            z-input 
                            [formControl]="description" 
                            type="text" 
                            name="name" 
                            [placeholder]="i18n.t('expenses.edit.description')"
                            class="w-full bg-slate-950/50 border-slate-700 text-slate-100 placeholder:text-slate-500 focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300"
                        />
                    </z-form-control>
                </z-form-field>
                
                <z-form-field class="space-y-2">
                    <label z-form-label zRequired class="text-slate-300 font-medium text-sm tracking-wide">{{ i18n.t('expenses.edit.amount') }}</label>
                    <z-form-control>
                        <input 
                            z-input 
                            [formControl]="amount" 
                            type="text" 
                            name="amount"
                            placeholder="0,00 €"
                            class="w-full bg-slate-950/50 border-slate-700 text-slate-100 placeholder:text-slate-500 focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300 font-mono"
                        />
                    </z-form-control>
                </z-form-field>
                
                <z-form-field class="space-y-2">
                    <label z-form-label zRequired class="text-slate-300 font-medium text-sm tracking-wide">{{ i18n.t('expenses.edit.date') }}</label>
                    <z-form-control>
                        <z-date-picker 
                            [value]="selectedDate()" 
                            [placeholder]="i18n.t('expenses.edit.selectDate')" 
                            (dateChange)="onDateChange($event)" 
                            zFormat="dd/MM/yyyy"
                            zType="outline"
                            [class]="'w-full !text-white !bg-slate-800 !border-slate-500'"
                        />
                    </z-form-control>
                </z-form-field>
                
                <z-form-field class="space-y-2">
                    <label z-form-label zRequired class="text-slate-300 font-medium text-sm tracking-wide">{{ i18n.t('expenses.edit.category') }}</label>
                    <z-form-control>
                        <select 
                            [formControl]="category"
                            class="w-full bg-slate-800 border border-slate-500 text-white rounded-md px-3 py-2 focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 outline-none"
                        >
                            <option value="" disabled>{{ i18n.t('expenses.edit.selectCategory') }}</option>
                            @for (cat of categories; track cat._id) {
                                <option [value]="cat._id">{{cat.description}}</option>
                            }
                        </select>
                    </z-form-control>
                </z-form-field>

                <z-form-field class="space-y-2">
                    <z-form-control>
                        <label class="flex items-center gap-3 text-slate-300 font-medium text-sm tracking-wide cursor-pointer">
                            <input
                                type="checkbox"
                                [formControl]="recurrent"
                                class="w-4 h-4 rounded border-slate-700 bg-slate-950 text-amber-500 focus:ring-amber-500/20 focus:ring-offset-slate-900 cursor-pointer"
                            />
                            {{ i18n.t('expenses.edit.recurrent') }}
                        </label>
                    </z-form-control>
                </z-form-field>
               
                
                <div class="flex gap-4 pt-6">
                    <button 
                        z-button 
                        type="submit" 
                        [zLoading]="isSubmiting()"
                        class="flex-1 relative overflow-hidden bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-semibold tracking-wide shadow-lg shadow-amber-900/30 hover:shadow-amber-600/40 hover:scale-[1.02] transition-all duration-300"
                    >
                        {{ i18n.t('expenses.edit.save') }}
                    </button>
                    
                    <button 
                        z-button 
                        zType="secondary" 
                        type="button"
                        (click)="gotoList()"
                        class="flex-1 bg-slate-800/50 hover:bg-slate-700/50 text-slate-300 border border-slate-700 hover:border-slate-600 font-medium tracking-wide transition-all duration-300"
                    >
                        {{ i18n.t('expenses.edit.cancel') }}
                    </button>
                </div>
            </form>
        </z-card>
    </div>
</div>
