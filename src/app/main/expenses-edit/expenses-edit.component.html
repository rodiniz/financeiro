<div class="flex items-center justify-center min-h-[calc(100vh-200px)] py-8">
    <div class="w-full max-w-3xl">
        <!-- Card Header -->
        <div class="mb-6">
            <h2 class="text-3xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-400">
                {{isEditing() ? 'Editar Despesa' : 'Nova Despesa'}}
            </h2>
            <p class="text-slate-500 text-sm mt-1">{{isEditing() ? 'Atualize os dados da despesa' : 'Adicione uma nova despesa ao sistema'}}</p>
        </div>
        
        <z-card class="relative overflow-hidden backdrop-blur-xl bg-slate-900/60 border-slate-700/50 shadow-2xl shadow-black/50 hover:shadow-amber-900/20 transition-all duration-500 p-8">
            <div class="absolute inset-0 bg-gradient-to-br from-amber-500/5 to-transparent opacity-50"></div>
            
            <form (ngSubmit)="onsubmit()" class="relative z-10 space-y-6">
                <input type="hidden" formControlName="id">
                
                <z-form-field class="space-y-2">
                    <label z-form-label zRequired class="text-slate-300 font-medium text-sm tracking-wide">Descrição</label>
                    <z-form-control>
                        <input 
                            z-input 
                            [formControl]="description" 
                            type="text" 
                            name="name" 
                            placeholder="Digite a descrição da despesa"
                            class="w-full bg-slate-950/50 border-slate-700 text-slate-100 placeholder:text-slate-500 focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300"
                        />
                    </z-form-control>
                </z-form-field>
                
                <z-form-field class="space-y-2">
                    <label z-form-label zRequired class="text-slate-300 font-medium text-sm tracking-wide">Valor</label>
                    <z-form-control>
                        <input 
                            z-input 
                            [formControl]="amount" 
                            type="text" 
                            name="amount"
                            placeholder="0,00 €"
                            class="w-full bg-slate-950/50 border-slate-700 text-slate-100 placeholder:text-slate-500 focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300 font-mono"
                        />
                    </z-form-control>
                </z-form-field>
                
                <z-form-field class="space-y-2">
                    <label z-form-label zRequired class="text-slate-300 font-medium text-sm tracking-wide">Data</label>
                    <z-form-control>
                        <z-date-picker 
                            [value]="selectedDate()" 
                            placeholder="Selecione a data" 
                            (dateChange)="onDateChange($event)" 
                            zFormat="dd/MM/yyyy"
                            class="w-full bg-slate-950/50 border-slate-700 text-slate-100 focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300"
                        />
                    </z-form-control>
                </z-form-field>
                
                <z-form-field class="space-y-2">
                    <label z-form-label zRequired class="text-slate-300 font-medium text-sm tracking-wide">Categoria</label>
                    <z-form-control>
                        <z-select 
                            class="w-full bg-slate-950/50 border-slate-700 text-slate-100 focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300" 
                            zPlaceholder="Selecione uma categoria" 
                            [(zValue)]="selectedCategory"
                        >
                            @for (cat of categories; track $index) {
                                <z-select-item [zValue]="cat.description" class="hover:bg-slate-800 text-slate-200">{{cat.description}}</z-select-item>
                            }
                        </z-select>
                    </z-form-control>
                </z-form-field>
                
                <div class="flex gap-4 pt-6">
                    <button 
                        z-button 
                        type="submit" 
                        [zLoading]="isSubmiting()"
                        class="flex-1 relative overflow-hidden bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-semibold tracking-wide shadow-lg shadow-amber-900/30 hover:shadow-amber-600/40 hover:scale-[1.02] transition-all duration-300"
                    >
                        Salvar
                    </button>
                    
                    <button 
                        z-button 
                        zType="secondary" 
                        type="button"
                        (click)="gotoList()"
                        class="flex-1 bg-slate-800/50 hover:bg-slate-700/50 text-slate-300 border border-slate-700 hover:border-slate-600 font-medium tracking-wide transition-all duration-300"
                    >
                        Cancelar
                    </button>
                </div>
            </form>
        </z-card>
    </div>
</div>
