<div class="relative flex min-h-screen overflow-hidden bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800">
  <!-- Language Switcher -->
  <div class="absolute top-4 right-4 z-50">
    <button 
      (click)="toggleLanguage()"
      class="flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-600 text-white rounded-lg hover:bg-slate-700 transition-all duration-200"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
      </svg>
      {{ i18n.language() === 'pt' ? 'PT' : 'EN' }}
    </button>
  </div>

  <!-- Decorative elements -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-amber-900/20 via-transparent to-transparent opacity-40"></div>
  <div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
  
  <div class="relative flex flex-1 items-center justify-center p-4 sm:p-8">
    <div class="w-full max-w-md space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
      <!-- Logo Section -->
      <div class="text-center space-y-3">
        <h1 class="text-5xl font-serif font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-amber-200 via-amber-400 to-amber-600 drop-shadow-[0_0_25px_rgba(251,191,36,0.3)]">
          {{ i18n.t('app.title') }}
        </h1>
        <p class="text-slate-400 text-sm tracking-wide font-light">{{ i18n.t('auth.subtitle') }}</p>
        <div class="flex items-center justify-center gap-2 pt-2">
          <div class="h-px w-8 bg-gradient-to-r from-transparent to-amber-500/50"></div>
          <div class="h-1 w-1 rounded-full bg-amber-500/70"></div>
          <div class="h-px w-8 bg-gradient-to-l from-transparent to-amber-500/50"></div>
        </div>
      </div>

      <!-- Login Card -->
      <z-card class="relative p-8 sm:p-10 backdrop-blur-xl bg-slate-900/60 border-slate-700/50 shadow-2xl shadow-black/50 hover:shadow-amber-900/20 transition-all duration-500 group">
        <div class="absolute inset-0 bg-gradient-to-br from-amber-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-lg"></div>
        
        <form [formGroup]="loginForm" class="relative space-y-6" (ngSubmit)="onSubmit()">
          <z-form-field class="space-y-2">
            <z-form-label [zRequired]="true" class="text-slate-300 font-medium text-sm tracking-wide">{{ i18n.t('auth.email') }}</z-form-label>
            <z-form-control>
              <input 
                z-input 
                type="email" 
                formControlName="email" 
                [placeholder]="i18n.t('auth.emailPlaceholder')" 
                class="w-full bg-slate-950/50 border-slate-700 text-slate-100 placeholder:text-slate-500 focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300" 
              />
            </z-form-control>
          </z-form-field>

          <z-form-field class="space-y-2">
            <div class="flex items-center justify-between">
              <z-form-label [zRequired]="true" class="text-slate-300 font-medium text-sm tracking-wide">{{ i18n.t('auth.password') }}</z-form-label>
            </div>
            <z-form-control>
              <input 
                z-input 
                type="password" 
                formControlName="password" 
                placeholder="••••••••" 
                class="w-full bg-slate-950/50 border-slate-700 text-slate-100 placeholder:text-slate-500 focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20 transition-all duration-300" 
              />
            </z-form-control>
          </z-form-field>

          <div class="flex items-center gap-3 p-4 rounded-lg bg-slate-950/50 border border-slate-700/50">
            <input 
              type="checkbox" 
              formControlName="hideMonetaryValues"
              (change)="onHideMonetaryValuesChange()"
              id="hideMonetaryValues"
              class="w-5 h-5 rounded border-slate-600 bg-slate-900 text-amber-500 focus:ring-amber-500/30 focus:ring-offset-slate-900 cursor-pointer transition-all duration-200"
            />
            <div class="flex-1">
              <label for="hideMonetaryValues" class="text-slate-300 font-medium text-sm tracking-wide cursor-pointer block">
                {{ i18n.t('auth.hideMonetaryValues') }}
              </label>
              <p class="text-slate-500 text-xs mt-1">{{ i18n.t('auth.hideMonetaryValuesDescription') }}</p>
            </div>
          </div>

          <button 
            type="submit" 
            z-button 
            zFull 
            [zLoading]="isLoading()" 
            [disabled]="isLoading()"
            class="mt-8 relative overflow-hidden bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-semibold tracking-wide shadow-lg shadow-amber-900/30 hover:shadow-amber-600/40 hover:scale-[1.02] transition-all duration-300"
          >
            {{ i18n.t('auth.loginButton') }}
          </button>
        </form>
      </z-card>

      <!-- Register Link -->
      <div class="text-center space-y-2">
        <p class="text-slate-400 text-sm font-light">
          {{ i18n.t('auth.noAccount') }}
        </p>
        <a 
          href="/register" 
          class="inline-block text-amber-400 hover:text-amber-300 font-medium text-sm tracking-wide underline decoration-amber-500/30 underline-offset-4 hover:decoration-amber-400/60 transition-all duration-300"
        >
          {{ i18n.t('auth.register') }}
        </a>
      </div>
    </div>
  </div>
</div>
