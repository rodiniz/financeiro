<div class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow p-3 mb-5 bg-white rounded" style="width: 30rem">
    <div class="card-body">
      <h2 class="card-title">Entrar</h2>
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            placeholder="example@example.com"
            [formControl]="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            class="form-control"
            placeholder="********"
            [formControl]="password"
          />
        </div>
        <button type="submit" class="btn btn-primary col-12 mx-auto mt-2">
          Login
        </button>
      </form>
      <p class="text-sm text-gray-700 mt-4">
        Não tem conta?
        <a href="/register" class="text-decoration-none">Criar conta</a>
      </p>
    </div>
  </div>
</div>
